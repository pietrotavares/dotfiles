- sudo:
  - shell:
    - [wget -qO - https://download.sublimetext.com/sublimehq-pub.gpg | sudo apt-key add -, Installing sublime text (1/3)]
    - [echo "deb https://download.sublimetext.com/ apt/stable/" | sudo tee /etc/apt/sources.list.d/sublime-text.list, Installing sublime text (2/3)]
    - [apt update && apt install -y sublime-text, Installing sublime text (3/3)]
